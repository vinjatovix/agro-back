LoginUserRequest:
  type: object
  required: [email, password]
  properties:
    email:
      type: string
    password:
      type: string

RegisterUserRequest:
  type: object
  required: [id, email, username, password, repeatPassword]
  properties:
    id:
      type: string
    email:
      type: string
    username:
      type: string
    password:
      type: string
    repeatPassword:
      type: string