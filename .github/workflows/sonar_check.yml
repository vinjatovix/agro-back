name: SonarCloud
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PORT: 3377
      HOST: http://localhost
      ALLOWED_ORIGINS: http://localhost:3377
      JSON_BODY_LIMIT: 1mb
      URL_ENCODED_BODY_LIMIT: 1mb
      REQUEST_TIMEOUT_MS: 30000
      HEADERS_TIMEOUT_MS: 35000
      KEEP_ALIVE_TIMEOUT_MS: 5000
      NODE_ENV: test
      MONGO_CONNECTION: mongodb
      MONGO_URL: localhost:27017
      MONGO_DB: test
      MONGO_USERNAME: localUser
      MONGO_PASSWORD: localPassword
      MONGO_APP_NAME: "Cluster0"
      JWT_SECRET: secret
      JWT_DEFAULT_DURATION: 2h
      BCRYPT_SALT_ROUNDS: 12
      MONGO_REPLICA_SET: rs0
      GOOGLE_CLIENT_ID: your-google-client-id.apps.googleusercontent.com

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Run mongo docker
        run: |
          npm run docker:mongo

      - name: Run tests
        run: npm run test

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
